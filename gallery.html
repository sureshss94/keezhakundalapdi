<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Keezhakundalapaadi Village Gallery</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:green;
    color:white;
    padding:25px;
    text-align:center;
}

header h1{
    margin-bottom:10px;
}

nav{
    background:#006400;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

nav a:hover{
    text-decoration:underline;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.gallery-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.photo-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.photo-card:hover{
    transform:translateY(-5px);
}

.photo-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.photo-content{
    padding:15px;
}

.photo-content h3{
    color:green;
    margin-bottom:10px;
}

.photo-content p{
    color:#666;
    font-size:14px;
}

.loading{
    text-align:center;
    padding:50px;
    font-size:20px;
}

.empty{
    text-align:center;
    font-size:22px;
    padding:50px;
    color:#666;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

@media(max-width:768px){

    .container{
        padding:15px;
    }

    .photo-card img{
        height:220px;
    }

    nav a{
        display:block;
        margin:10px 0;
    }
}

</style>

</head>

<body>

<header>

<h1>📸 Keezhakundalapaadi Village Gallery</h1>

<p>
Temple Festivals • Village Events • Community Photos
</p>

</header>

<nav>

<a href="index.html">🏡 Home</a>
<a href="gallery.html">📸 Gallery</a>
<a href="login.html">🔐 Admin Login</a>

</nav>

<div class="container">

<div class="card">

<h2 style="margin-bottom:20px;">
📸 Village Photo Gallery
</h2>

<div
id="galleryContainer"
class="loading">

Loading Photos...

</div>

</div>

</div>

<footer>

<p>
© 2026 Keezhakundalapaadi Village Portal
</p>

<p>
Managed by Super Admin Suresh
</p>

</footer>

<script>

const client =
supabase.createClient(
"https://uulptnmglchzvdsausrh.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1bHB0bm1nbGNoenZkc2F1c3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDM1MDMsImV4cCI6MjA5NzYxOTUwM30.ONrOp74l3aPM6b84v9FyEGFOrG5y88PsFSyy_3u_ces"
);

async function loadGallery(){

    const { data,error } =
    await client
    .from("gallery")
    .select("*")
    .eq("status","approved")
    .order("created_at",
    {ascending:false});

    const container =
    document.getElementById(
    "galleryContainer"
    );

    if(error){

        console.log(error);

        container.innerHTML =
        `
        <div class="empty">
        ❌ Unable to load gallery.
        </div>
        `;

        return;
    }

    if(!data ||
       data.length===0){

        container.innerHTML =
        `
        <div class="empty">
        📸 No photos available.
        </div>
        `;

        return;
    }

    let html =
    `<div class="gallery-grid">`;

    data.forEach(photo=>{

        html += `

        <div class="photo-card">

            <img
            src="${photo.image_url}"
            alt="${photo.title}">

            <div class="photo-content">

                <h3>
                ${photo.title}
                </h3>

                <p>

                Uploaded:
                ${
                new Date(
                photo.created_at
                ).toLocaleDateString()
                }

                </p>

            </div>

        </div>

        `;
    });

    html += `</div>`;

    container.innerHTML =
    html;
}

loadGallery();

</script>

</body>
</html>
