<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keezhakundalapaadi Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:green;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#msg{
    text-align:center;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="card">

<h2>🏡 Admin Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button id="loginBtn" onclick="login()">
Login
</button>

<p id="msg"></p>

</div>

<script>

const sbClient = window.supabase.createClient(
"https://uulptnmglchzvdsausrh.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1bHB0bm1nbGNoenZkc2F1c3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDM1MDMsImV4cCI6MjA5NzYxOTUwM30.ONrOp74l3aPM6b84v9FyEGFOrG5y88PsFSyy_3u_ces"
);

async function login(){

    const email =
    document.getElementById("email").value.trim();

    const password =
    document.getElementById("password").value;

    const msg =
    document.getElementById("msg");

    const btn =
    document.getElementById("loginBtn");

    msg.innerHTML = "";

    if(email === "" || password === ""){

        msg.style.color = "red";
        msg.innerHTML = "Please enter email and password";
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "Logging in...";

    try{

        const { data, error } =
        await sbClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if(error){

            msg.style.color = "red";
            msg.innerHTML = error.message;

            btn.disabled = false;
            btn.innerHTML = "Login";

            return;
        }

        localStorage.setItem(
            "sb-session",
            JSON.stringify(data.session)
        );

        msg.style.color = "green";
        msg.innerHTML = "Login Successful";

        setTimeout(function(){

            window.location.href =
            "admin.html";

        },1000);

    }
    catch(ex){

        console.log(ex);

        msg.style.color = "red";
        msg.innerHTML =
        "Login Failed. Check browser console.";

        btn.disabled = false;
        btn.innerHTML = "Login";
    }
}

</script>

</body>
</html>
